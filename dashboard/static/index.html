<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titulus</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <!-- Three.js for 3D Manifold Rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
</head>
<body>
    <!-- The 3D Canvas Background -->
    <div id="webgl-container"></div>

    <div class="ui-layer">
        <header>
            <div class="logo-container">
                <div class="merkaba-icon">✡</div>
                <h1>SOVEREIGN <span class="accent">CONSOLE</span></h1>
            </div>
            <div class="status-indicator">
                <span class="pulse-dot"></span>
                <span class="status-text">MANIFOLD RENDERED</span>
            </div>
        </header>

        <div class="main-content">
            <!-- Left Panel: Scanner -->
            <section class="scanner-panel glass-panel">
                <h2>URIM SCANNER</h2>
                <p class="subtitle">Query the 8D Genesis Manifold. Matches will ignite in the 3D lattice.</p>
                
                <div class="search-container">
                    <input type="text" id="scan-input" placeholder="Enter a concept (e.g. 'Light', 'Firmament')">
                    <button id="scan-btn">SCAN LATTICE</button>
                </div>

                <div class="results-container" id="results-container">
                    <div class="empty-state">Awaiting structural input...</div>
                </div>
            </section>

            <!-- Right Panel: Data Telemetry -->
            <section class="telemetry-panel glass-panel">
                <h2>SYSTEM TELEMETRY</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>8D VERSE NODES</h3>
                        <div class="stat-value" id="stat-verses">--</div>
                    </div>
                    <div class="stat-card">
                        <h3>ROOT VECTORS</h3>
                        <div class="stat-value" id="stat-roots">--</div>
                    </div>
                    <div class="stat-card">
                        <h3>ACTIVE ROLE</h3>
                        <div class="stat-value text-accent" id="stat-role" style="font-size:1.2rem;">--</div>
                        <div class="stat-sub" id="stat-hz">Frequency: --</div>
                    </div>
                </div>
            </section>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
